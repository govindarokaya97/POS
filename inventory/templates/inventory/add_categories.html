{% extends 'base.html' %}
{% block title %}Add category{% endblock title %}

{% block content %}
<div class="mx-auto max-w-xl">
    <div class="mb-6">
        <p class="font-mono text-xs uppercase tracking-[0.2em] text-muted">Inventory</p>
        <h1 class="mt-1 font-display text-2xl font-semibold text-ink">Add category</h1>
    </div>

    <div class="rounded-xl border border-line bg-white p-8">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="name" class="mb-2 block text-sm font-medium text-ink">Category name</label>
                <input type="text" id="name" name="name" placeholder="Enter category name" required
                    class="w-full rounded-lg border border-line bg-paper px-4 py-3 text-sm text-ink outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/20" />
            </div>

            <div>
                <label for="description" class="mb-2 block text-sm font-medium text-ink">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Write a short description"
                    class="w-full rounded-lg border border-line bg-paper px-4 py-3 text-sm text-ink outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/20"></textarea>
            </div>

            <div class="flex items-center justify-end gap-3 pt-2">
                <a href="{% url 'view_category' %}" class="rounded-lg px-4 py-2.5 text-sm font-medium text-muted hover:text-ink">Cancel</a>
                <button type="submit"
                    class="rounded-lg bg-brand px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-dark">
                    Add category
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
