{% extends 'base.html' %}
{% block title %}Add product{% endblock title %}

{% block content %}
<div class="mx-auto max-w-3xl">
    <div class="mb-6">
        <p class="font-mono text-xs uppercase tracking-[0.2em] text-muted">Inventory</p>
        <h1 class="mt-1 font-display text-2xl font-semibold text-ink">Add product</h1>
    </div>

    <div class="rounded-xl border border-line bg-white p-8">
        <form class="space-y-6" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="grid gap-6 md:grid-cols-2">
                <div>
                    <label for="name" class="mb-2 block text-sm font-medium text-ink">Product name</label>
                    <input type="text" id="name" name="name" placeholder="Enter product name"
                        value="{{ form_data.name }}"
                        class="w-full rounded-lg border border-line bg-paper px-4 py-3 text-sm text-ink outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/20" />
                </div>

                <div>
                    <label for="category" class="mb-2 block text-sm font-medium text-ink">Category</label>
                    <select id="category" name="category"
                        class="w-full rounded-lg border border-line bg-paper px-4 py-3 text-sm text-ink outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/20">
                        <option value="" {% if not form_data.category %}selected{% endif %}>Select a category</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}" {% if form_data.category == category.id|stringformat:"s" %}selected{% endif %}>{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="price" class="mb-2 block text-sm font-medium text-ink">Price (Rs)</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" placeholder="0.00"
                        value="{{ form_data.price }}"
                        class="w-full rounded-lg border border-line bg-paper px-4 py-3 font-mono text-sm text-ink outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/20" />
                </div>

                <div>
                    <label for="stock" class="mb-2 block text-sm font-medium text-ink">Stock</label>
                    <input type="number" id="stock" name="stock" min="0" placeholder="Enter stock quantity"
                        value="{{ form_data.stock }}"
                        class="w-full rounded-lg border border-line bg-paper px-4 py-3 font-mono text-sm text-ink outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/20" />
                </div>
            </div>

            <div>
                <label for="description" class="mb-2 block text-sm font-medium text-ink">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Write a short product description"
                    class="w-full rounded-lg border border-line bg-paper px-4 py-3 text-sm text-ink outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/20">{{ form_data.description }}</textarea>
            </div>

            <div>
                <label for="image" class="mb-2 block text-sm font-medium text-ink">Product image</label>
                <input type="file" id="image" name="image"
                    class="w-full rounded-lg border border-line bg-paper px-4 py-3 text-sm text-ink file:mr-4 file:rounded-md file:border-0 file:bg-ink file:px-4 file:py-2 file:text-sm file:font-medium file:text-white hover:file:bg-ink-2" />
            </div>

            <div class="flex items-center justify-end gap-3 pt-2">
                <a href="{% url 'view_product' %}" class="rounded-lg px-4 py-2.5 text-sm font-medium text-muted hover:text-ink">Cancel</a>
                <button type="submit"
                    class="rounded-lg bg-brand px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-dark">
                    Add product
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
