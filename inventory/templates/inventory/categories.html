{% extends 'base.html' %}
{% block title %}Categories{% endblock title %}

{% block content %}
<div class="space-y-8">
    <div>
        <p class="font-mono text-xs uppercase tracking-[0.2em] text-muted">Inventory</p>
        <h1 class="mt-1 font-display text-3xl font-semibold text-ink">Categories</h1>
        <p class="mt-1 text-sm text-muted">Organize your products into categories.</p>
    </div>

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
        <a href="{% url 'add_category' %}"
            class="group flex flex-col justify-between rounded-xl border border-line bg-white p-6 transition hover:border-ink/20">
            <div>
                <div class="flex h-11 w-11 items-center justify-center rounded-lg bg-brand/10 text-brand">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <h3 class="mt-5 font-display text-lg font-semibold text-ink">Add category</h3>
                <p class="mt-1.5 text-sm text-muted">Create a new product category.</p>
            </div>
            <span class="mt-5 inline-flex items-center gap-1.5 text-sm font-medium text-brand">
                Open <i class="fa-solid fa-arrow-right text-xs transition group-hover:translate-x-0.5"></i>
            </span>
        </a>

        <a href="{% url 'view_category' %}"
            class="group flex flex-col justify-between rounded-xl border border-line bg-white p-6 transition hover:border-ink/20">
            <div>
                <div class="flex h-11 w-11 items-center justify-center rounded-lg bg-ink/5 text-ink">
                    <i class="fa-solid fa-list"></i>
                </div>
                <h3 class="mt-5 font-display text-lg font-semibold text-ink">View categories</h3>
                <p class="mt-1.5 text-sm text-muted">See and manage every category.</p>
            </div>
            <span class="mt-5 inline-flex items-center gap-1.5 text-sm font-medium text-ink">
                Open <i class="fa-solid fa-arrow-right text-xs transition group-hover:translate-x-0.5"></i>
            </span>
        </a>
    </div>
</div>
{% endblock content %}
