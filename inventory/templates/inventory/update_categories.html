{% extends 'base.html' %}
{% block title %}Update Category{% endblock title %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
    <div class="mb-8">
        <h1 class="text-2xl font-semibold text-slate-900">Update Category</h1>
        <p class="mt-2 text-sm text-slate-500">Edit the details of this inventory category.</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <div>
            <label for="name" class="mb-2 block text-sm font-medium text-slate-700">Category Name</label>
            <input type="text" id="name" name="name" value="{{ category.name }}"
                class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-100"
                required />
        </div>

        <div>
            <label for="description" class="mb-2 block text-sm font-medium text-slate-700">Description</label>
            <textarea id="description" name="description" rows="4"
                class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-100">{{ category.description }}</textarea>
        </div>

        <div class="flex items-center justify-end gap-3 pt-2">
            <a href="{% url 'view_category' %}"
                class="rounded-xl border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                Cancel
            </a>
            <button type="submit"
                class="rounded-xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
                Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock content %}
