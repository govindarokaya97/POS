{% extends 'base.html' %}
{% block title %}Add Category{% endblock title %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
  <div class="mb-8">
    <h1 class="text-2xl font-semibold text-slate-900">Update Category</h1>
    <p class="mt-2 text-sm text-slate-500">Update product category for your inventory.</p>
  </div>

  <form method="post" class="space-y-6">
    {% csrf_token %}

    <div>
      <label for="name" class="mb-2 block text-sm font-medium text-slate-700">Category Name</label>
      <input
        type="text"
        id="name"
        name="name"
        value="{{ category.name }}"
        placeholder="Enter category name"
        class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-100"
        required
      />
    </div>

    <div>
      <label for="description" class="mb-2 block text-sm font-medium text-slate-700">Description</label>
      <textarea
        id="description"
        name="description"
        value="{{ category.description }}"
        rows="4"
        placeholder="Write a short description"
        class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-100"
      ></textarea>
    </div>

    <div class="flex items-center justify-end pt-2">
      <button
        type="submit"
        class="rounded-xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800"
      >
        Update Category
      </button>
    </div>
  </form>
</div>
{% endblock content %}
