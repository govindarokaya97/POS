{% extends 'base.html' %}
{% block title %}Update Product{% endblock title %}

{% block content %}
<div class="mx-auto max-w-4xl rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
  <div class="mb-8">
    <h1 class="text-2xl font-semibold text-slate-900">Update Product</h1>
    <p class="mt-2 text-sm text-slate-500">Fill in the details below to update the product information.</p>
  </div>

  <form class="space-y-6" method="POST" entype="multipart/form-data">
    {% csrf_token %}
    <div class="grid gap-6 md:grid-cols-2">
      <div>
        <label for="name" class="mb-2 block text-sm font-medium text-slate-700">Product Name</label>
        <input
          type="text"
          id="name"
          name="name"
          value="{{ product.name }}"
          placeholder="Enter product name"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-100"
        />
      </div>

      <div>
        <label for="category" class="mb-2 block text-sm font-medium text-slate-700">Category</label>
        <select
          id="category"
          name="category"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-100"
        >
        {% for category  in categories %}
          <option 
          value="{{ category.id }}"
          {% if category.id == product.category.id %}
            selected
          {% endif %}          
          >{{ category.name }}</option>
        {% endfor %}
        </select>
      </div>

      <div>
        <label for="price" class="mb-2 block text-sm font-medium text-slate-700">Price</label>
        <input
          type="number"
          id="price"
          name="price"
          value={{ product.price }}
          step="0.01"
          placeholder="0.00"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-100"
        />
      </div>

      <div>
        <label for="stock" class="mb-2 block text-sm font-medium text-slate-700">Stock</label>
        <input
          type="number"
          id="stock"
          name="stock"
          min="0"
          value={{ product.stock }}
          placeholder="Enter stock quantity"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-100"
        />
      </div>
    </div>

    <div>
      <label for="description" class="mb-2 block text-sm font-medium text-slate-700">Description</label>
      <textarea
        id="description"
        name="description"
        rows="4"
        value={{ product.description }}
        placeholder="Write a short product description"
        class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-100"
      ></textarea>
    </div>

    <div>
      <label for="image" class="mb-2 block text-sm font-medium text-slate-700">Product Image</label>
      <input
        type="file"
        id="image"
        name="image"
        class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-700 file:mr-4 file:rounded-lg file:border-0 file:bg-slate-100 file:px-4 file:py-2 file:text-sm file:font-medium file:text-slate-700 hover:file:bg-slate-200"
      />
    </div>

    <div class="flex items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
      <input type="checkbox" id="is_available" name="is_available" checked class="h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-500" />
      <label for="is_available" class="text-sm text-slate-700">Available for sale</label>
    </div>

    <div class="flex items-center justify-end pt-2">
      <button
        type="submit"
        class="rounded-xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800"
      >
        Update Product
      </button>
    </div>
  </form>
</div>
{% endblock content %}
