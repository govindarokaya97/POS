{% extends "base.html" %}
{% block title %}New sale{% endblock title %}

{% block content %}
<div class="space-y-8">
    <div>
        <p class="font-mono text-xs uppercase tracking-[0.2em] text-muted">Point of sale</p>
        <h1 class="mt-1 font-display text-3xl font-semibold text-ink">New sale</h1>
        <p class="mt-1 text-sm text-muted">Choose a product and quantity to complete the transaction.</p>
    </div>

    <div class="mx-auto max-w-lg rounded-xl border border-line bg-white p-8">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="product" class="mb-2 block text-sm font-medium text-ink">Product</label>
                <select name="product" id="product"
                    class="w-full rounded-lg border border-line bg-paper px-4 py-3 text-sm text-ink outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/20">
                    {% for product in products %}
                    <option value="{{ product.id }}">{{ product.name }} &mdash; Rs {{ product.price }} ({{ product.stock }} in stock)</option>
                    {% empty %}
                    <option value="" disabled selected>No products available</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="quantity" class="mb-2 block text-sm font-medium text-ink">Quantity</label>
                <input type="number" name="quantity" id="quantity" min="1" step="1" placeholder="1"
                    class="w-full rounded-lg border border-line bg-paper px-4 py-3 font-mono text-sm text-ink outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/20" />
            </div>

            <button type="submit"
                class="flex w-full items-center justify-center gap-2 rounded-lg bg-brand px-6 py-3 text-sm font-semibold text-white transition hover:bg-brand-dark focus:outline-none focus:ring-2 focus:ring-brand/40 focus:ring-offset-2 focus:ring-offset-white">
                <i class="fa-solid fa-cash-register"></i>
                Complete sale
            </button>
        </form>
    </div>
</div>
{% endblock content %}
