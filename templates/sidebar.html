<aside class="flex w-64 flex-col justify-between bg-ink text-white/90">
    <div>
        <div class="border-b border-white/10 px-6 py-6">
            <p class="font-display text-lg font-semibold tracking-tight text-white">POS</p>
            <p class="mt-0.5 font-mono text-[11px] uppercase tracking-[0.2em] text-white/40">Counter&nbsp;01</p>
        </div>

        <div class="flex items-center gap-3 border-b border-white/10 px-6 py-5">
            <div class="flex h-9 w-9 items-center justify-center rounded-full bg-brand/20 font-display text-sm font-semibold text-brand">
                {{ request.user.username|slice:":1"|upper }}
            </div>
            <div class="min-w-0">
                <p class="truncate text-sm font-medium text-white">{{ request.user.username }}</p>
                <p class="text-xs text-white/40">Signed in</p>
            </div>
        </div>

        <nav class="mt-4 space-y-1 px-3">
            <a href="{% url 'dashboard' %}"
                class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition {% if request.resolver_match.url_name == 'dashboard' %}bg-white/10 text-white{% else %}text-white/60 hover:bg-white/5 hover:text-white{% endif %}">
                <i class="fa-solid fa-gauge-high w-4 text-center"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'category' %}"
                class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition {% if 'categor' in request.resolver_match.url_name %}bg-white/10 text-white{% else %}text-white/60 hover:bg-white/5 hover:text-white{% endif %}">
                <i class="fa-solid fa-tags w-4 text-center"></i>
                <span>Categories</span>
            </a>
            <a href="{% url 'products' %}"
                class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition {% if 'product' in request.resolver_match.url_name %}bg-white/10 text-white{% else %}text-white/60 hover:bg-white/5 hover:text-white{% endif %}">
                <i class="fa-solid fa-box w-4 text-center"></i>
                <span>Products</span>
            </a>
            <a href="{% url 'sales_dashboard' %}"
                class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition {% if 'sale' in request.resolver_match.url_name %}bg-white/10 text-white{% else %}text-white/60 hover:bg-white/5 hover:text-white{% endif %}">
                <i class="fa-solid fa-cash-register w-4 text-center"></i>
                <span>Sales</span>
            </a>
        </nav>
    </div>

    <div class="border-t border-white/10 p-3">
        <a href="{% url 'logout' %}"
            class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/60 transition hover:bg-red/20 hover:text-white">
            <i class="fa-solid fa-right-from-bracket w-4 text-center"></i>
            <span>Log out</span>
        </a>
    </div>
</aside>
